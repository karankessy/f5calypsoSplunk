[calypsoai]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)\{"source":"calypsoai"
TRUNCATE = 0
KV_MODE = json
INDEXED_EXTRACTIONS = json
TIME_PREFIX = "time"\s*:\s*
TIME_FORMAT = %s
MAX_TIMESTAMP_LOOKAHEAD = 10

# Lightweight aliases so both flat and nested payloads can be queried consistently.
FIELDALIAS-calypso_event_type = event.event_type AS event_type
FIELDALIAS-calypso_event_id = event.event_id AS event_id
FIELDALIAS-calypso_project_id = event.project_id AS project_id
FIELDALIAS-calypso_user_input = event.user_input AS user_input
FIELDALIAS-calypso_scanner_outcome = event.scanner_outcome AS scanner_outcome

# Support extraction for array/object scanner results when provided by payloads.
REPORT-calypso_scanner_fields = calypso_scanner_fields
